<div class="wave-container">
  <div class="wave wave1"></div>
  <div class="wave wave2"></div>
  <div class="wave wave3"></div>

  <div class="login-card">

    <div class="card-header">
      <h2>{{ isLoginMode() ? 'Login to Smart Budget' : 'Create an Account' }}</h2>
      <p>Smart Expense Tracker</p>
    </div>

    @if (errorMessage()) {
    <div class="error-banner">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
        style="margin-right: 8px; margin-top: 2px;">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="8" x2="12" y2="12"></line>
        <line x1="12" y1="16" x2="12.01" y2="16"></line>
      </svg>
      <span>{{ errorMessage() }}</span>
    </div>
    }

    <form [formGroup]="authForm" (ngSubmit)="onSubmit()">

      <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" formControlName="email" placeholder="hello@example.com"
          [class.input-wobble]="errorMessage()" required>
      </div>

      <div class="input-group">
        <label for="password">Password</label>

        <div class="password-wrapper">
          <input [type]="showPassword() ? 'text' : 'password'" id="password" formControlName="password"
            placeholder="••••••••" [class.input-wobble]="errorMessage()" required>

          <button type="button" class="eye-btn" (click)="togglePassword()">
            @if (showPassword()) {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24">
              </path>
              <line x1="1" y1="1" x2="23" y2="23"></line>
            </svg>
            } @else {
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
              <circle cx="12" cy="12" r="3"></circle>
            </svg>
            }
          </button>
        </div>
      </div>

      <button type="submit" class="submit-btn" [class.btn-loading]="isLoading()"
        [disabled]="authForm.invalid || isLoading()">
        <span class="btn-text">{{isLoginMode() ? 'Login' : 'Register' }}</span>
        <div class="crazy-spinner"></div>
      </button>

      <p class="toggle-text">
        {{ isLoginMode() ? "Need an account?" : "Already have an account?" }}
        <button type="button" class="toggle-btn" (click)="toggleMode()">
          {{ isLoginMode() ? 'Register here' : 'Login' }}
        </button>
      </p>

    </form>
  </div>
</div>
