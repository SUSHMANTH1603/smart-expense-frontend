<div class="auth-container" style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc; border-radius: 8px;">
  
  <h2>{{ isLoginMode() ? 'Login to Smart Budget' : 'Create an Account' }}</h2>

  @if (errorMessage()) {
    <div style="color: red; margin-bottom: 15px;">
      {{ errorMessage() }}
    </div>
  }

  <form [formGroup]="authForm" (ngSubmit)="onSubmit()">
    <div style="margin-bottom: 15px;">
      <label>Email</label>
      <input type="email" formControlName="email" style="width: 100%; padding: 8px; margin-top: 5px;">
    </div>

    <div style="margin-bottom: 15px;">
      <label>Password</label>
      <input type="password" formControlName="password" style="width: 100%; padding: 8px; margin-top: 5px;">
    </div>

    <button type="submit" [disabled]="authForm.invalid" style="width: 100%; padding: 10px; background: #007bff; color: white; border: none; border-radius: 4px;">
      {{ isLoginMode() ? 'Login' : 'Register' }}
    </button>
  </form>

  <div style="margin-top: 15px; text-align: center;">
    <button (click)="toggleMode()" style="background: none; border: none; color: #007bff; cursor: pointer; text-decoration: underline;">
      {{ isLoginMode() ? 'Need an account? Register here' : 'Already have an account? Login' }}
    </button>
  </div>
</div>
